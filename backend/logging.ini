[loggers]
keys=root,arkbot,api,strategy,trades,risk

[handlers]
keys=consoleHandler,arkbotHandler,errorHandler,apiHandler,strategyHandler,tradesHandler,riskHandler,telegramHandler

[formatters]
keys=jsonFormatter,standardFormatter,tradeFormatter,riskFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_arkbot]
level=DEBUG
handlers=consoleHandler,arkbotHandler,errorHandler,telegramHandler
qualname=arkbot
propagate=0

[logger_api]
level=INFO
handlers=apiHandler
qualname=api
propagate=0

[logger_strategy]
level=DEBUG
handlers=strategyHandler
qualname=strategy
propagate=0

[logger_trades]
level=INFO
handlers=tradesHandler
qualname=trades
propagate=0

[logger_risk]
level=WARNING
handlers=riskHandler
qualname=risk
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standardFormatter
args=(sys.stdout,)

[handler_arkbotHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=jsonFormatter
args=("%(ARKBOT_LOG)s", "midnight", 7)

[handler_errorHandler]
class=handlers.TimedRotatingFileHandler
level=ERROR
formatter=jsonFormatter
args=("%(ERROR_LOG)s", "midnight", 7)

[handler_apiHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=jsonFormatter
args=("%(ARKBOT_LOG)s", "midnight", 7)

[handler_strategyHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=jsonFormatter
args=("%(ARKBOT_LOG)s", "midnight", 7)

[handler_tradesHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=tradeFormatter
args=("%(TRADES_LOG)s", "midnight", 7)

[handler_riskHandler]
class=handlers.TimedRotatingFileHandler
level=WARNING
formatter=riskFormatter
args=("%(RISK_LOG)s", "midnight", 7)

[handler_telegramHandler]
class=app.utils.logger.TelegramHandler
level=CRITICAL
formatter=standardFormatter
args=("%(ADMIN_TELEGRAM_ID)s",)

[formatter_standardFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_jsonFormatter]
format={"time":"%(asctime)s","logger":"%(name)s","level":"%(levelname)s","user_id":"%(user_id)s","symbol":"%(symbol)s","trade_id":"%(trade_id)s","message":"%(message)s"}
datefmt=%Y-%m-%d %H:%M:%S

[formatter_tradeFormatter]
format=%(asctime)s | TRADE | symbol=%(symbol)s | side=%(side)s | entry=%(entry_price)s | exit=%(exit_price)s | pnl=%(profit_loss)s | sentiment=%(sentiment)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_riskFormatter]
format=%(asctime)s | RISK | reason=%(reason)s | symbol=%(symbol)s | position_size=%(position_size)s | deposit=%(deposit)s
datefmt=%Y-%m-%d %H:%M:%S
