[loggers]
keys=root,arkbot

[handlers]
keys=consoleHandler,rotatingFileHandler,errorFileHandler

[formatters]
keys=standardFormatter,errorFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_arkbot]
level=DEBUG
handlers=consoleHandler,rotatingFileHandler,errorFileHandler
qualname=arkbot
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standardFormatter
args=(sys.stdout,)

[handler_rotatingFileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=standardFormatter
args=("logs/arkbot.log", "a", 10485760, 5)

[handler_errorFileHandler]
class=FileHandler
level=ERROR
formatter=errorFormatter
args=("logs/errors.log", "a")

[formatter_standardFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_errorFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
