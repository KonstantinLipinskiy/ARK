[loggers]
keys=root,arkbot,api,strategy,trades

[handlers]
keys=consoleHandler,arkbotHandler,errorHandler,apiHandler,strategyHandler,tradesHandler

[formatters]
keys=jsonFormatter,standardFormatter,errorFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_arkbot]
level=DEBUG
handlers=consoleHandler,arkbotHandler,errorHandler
qualname=arkbot
propagate=0

[logger_api]
level=INFO
handlers=apiHandler
qualname=api
propagate=0

[logger_strategy]
level=DEBUG
handlers=strategyHandler
qualname=strategy
propagate=0

[logger_trades]
level=INFO
handlers=tradesHandler
qualname=trades
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=standardFormatter
args=(sys.stdout,)

[handler_arkbotHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=jsonFormatter
args=("logs/arkbot.log", "midnight", 7)

[handler_errorHandler]
class=handlers.TimedRotatingFileHandler
level=ERROR
formatter=jsonFormatter
args=("logs/errors.log", "midnight", 7)

[handler_apiHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=jsonFormatter
args=("logs/api.log", "midnight", 7)

[handler_strategyHandler]
class=handlers.TimedRotatingFileHandler
level=DEBUG
formatter=jsonFormatter
args=("logs/strategy.log", "midnight", 7)

[handler_tradesHandler]
class=handlers.TimedRotatingFileHandler
level=INFO
formatter=jsonFormatter
args=("logs/trades.log", "midnight", 7)

[formatter_standardFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_errorFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_jsonFormatter]
format={"time":"%(asctime)s","logger":"%(name)s","level":"%(levelname)s","user_id":"%(user_id)s","symbol":"%(symbol)s","trade_id":"%(trade_id)s","message":"%(message)s"}
datefmt=%Y-%m-%d %H:%M:%S
