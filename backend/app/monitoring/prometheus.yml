global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  # Метрики самого Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          env: "prod"
          project: "ark_bot"
          service: "prometheus"

  # Метрики ARK Bot API
  - job_name: "ark_bot"
    metrics_path: /metrics
    static_configs:
      - targets: ["ark_bot:8000"]
        labels:
          env: "prod"
          project: "ark_bot"
          service: "api"

  # Метрики Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
        labels:
          env: "prod"
          project: "ark_bot"
          service: "redis"

  # Метрики RabbitMQ (если включен prometheus-плагин)
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          env: "prod"
          project: "ark_bot"
          service: "rabbitmq"

  # Метрики PostgreSQL (через postgres_exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]
        labels:
          env: "prod"
          project: "ark_bot"
          service: "postgres"
