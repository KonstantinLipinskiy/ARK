global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "telegram_critical"
    - match:
        severity: warning
      receiver: "slack_warnings"
    - match:
        severity: info
      receiver: "email_info"

receivers:
  # --- Telegram для критических алертов ---
  - name: "telegram_critical"
    telegram_configs:
      - bot_token: "8664086301:AAGpmpsXEytmZPnF3AcLmVM_F2OFXgAItYQ"   # из .env TELEGRAM_TOKEN
        chat_id: "685072393"                                          # из .env TELEGRAM_CHAT_ID
        parse_mode: "Markdown"
        message: |
          🚨 *Critical Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instance:* {{ .CommonLabels.instance }}
          *Project:* {{ .CommonLabels.project }}
          *Environment:* {{ .CommonLabels.env }}

  # --- Slack для warning ---
  - name: "slack_warnings"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/YOUR_REAL_WEBHOOK"   # нужно заменить на реальный Slack webhook
        channel: "#alerts-warning"
        send_resolved: true
        text: |
          ⚠️ *Warning Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instance:* {{ .CommonLabels.instance }}
          *Project:* {{ .CommonLabels.project }}
          *Environment:* {{ .CommonLabels.env }}

  # --- Email для info ---
  - name: "email_info"
    email_configs:
      - to: "alerts-info@example.com"                # получатель
        from: "alertmanager@example.com"             # отправитель
        smarthost: "smtp.example.com:587"            # SMTP сервер
        auth_username: "alertmanager@example.com"    # логин
        auth_password: "YOUR_SMTP_PASSWORD"          # пароль SMTP
        send_resolved: true
        headers:
          subject: "[INFO Alert] {{ .CommonLabels.alertname }}"
        html: |
          <b>Info Alert:</b> {{ .CommonLabels.alertname }}<br>
          Severity: {{ .CommonLabels.severity }}<br>
          Summary: {{ .CommonAnnotations.summary }}<br>
          Description: {{ .CommonAnnotations.description }}<br>
          Instance: {{ .CommonLabels.instance }}<br>
          Project: {{ .CommonLabels.project }}<br>
          Environment: {{ .CommonLabels.env }}

  # --- Default receiver (на всякий случай) ---
  - name: "default"
    telegram_configs:
      - bot_token: "8664086301:AAGpmpsXEytmZPnF3AcLmVM_F2OFXgAItYQ"   # тот же токен
        chat_id: "685072393"                                          # тот же чат
        parse_mode: "Markdown"
        message: |
          🔔 *Default Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
