global:
  resolve_timeout: 5m

route:
  receiver: "telegram"
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: "telegram"
    - match:
        severity: warning
      receiver: "telegram"

receivers:
  - name: "telegram"
    telegram_configs:
      - bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
        chat_id: "YOUR_TELEGRAM_CHAT_ID"
        parse_mode: "Markdown"
        message: |
          🚨 *Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Summary:* {{ .CommonAnnotations.summary }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instance:* {{ .CommonLabels.instance }}
          *Project:* {{ .CommonLabels.project }}
          *Environment:* {{ .CommonLabels.env }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
