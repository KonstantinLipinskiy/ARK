[alembic]
# Путь к папке миграций
script_location = alembic

# Строка подключения к БД (лучше брать из env)
sqlalchemy.url = sqlite:///./arkbot.db
# Для PostgreSQL будет так:
# sqlalchemy.url = postgresql://user:password@localhost:5432/arkbot

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
